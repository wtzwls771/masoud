name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # إصدار مستقر
          channel: 'stable'

      - name: Backup custom files
        run: |
          mv lib/main.dart lib/main_custom.dart
          mv pubspec.yaml pubspec_custom.yaml

      - name: Generate Flutter project scaffolding
        run: flutter create --org com.masoud .

      - name: Restore custom files
        run: |
          mv lib/main_custom.dart lib/main.dart
          mv pubspec_custom.yaml pubspec.yaml

      - name: Add Internet Permission to AndroidManifest
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MasoudPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
