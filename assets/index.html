<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسعود بـرو - صانع الاختبارات اليمني (نسخة المحمول)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; margin: 0; overflow: hidden; touch-action: none; }
        .font-amiri { font-family: 'Amiri', serif !important; }
        .font-tajawal { font-family: 'Tajawal', sans-serif !important; }
        
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; direction: rtl; -webkit-print-color-adjust: exact; print-color-adjust: exact; overflow: visible; touch-action: auto; }
            .print\:hidden { display: none !important; }
            .print\:break-after-page { page-break-after: always; break-after: page; }
            .print\:break-after-page:last-child { page-break-after: auto; break-after: auto; }
            
            .watermark-container {
                position: absolute !important;
                inset: 0 !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                pointer-events: none !important;
                z-index: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('questions'); 
            const [zoom, setZoom] = useState(0.75); 
            const [logo, setLogo] = useState(null); 
            const fileInputRef = useRef(null);
            const [textHistory, setTextHistory] = useState({});

            const [aiRawText, setAiRawText] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [aiStatus, setAiStatus] = useState(null); 
            const [geminiApiKey, setGeminiApiKey] = useState("AIzaSyD53caUGwhq2SqJurYeOiyo_t6H7NYVmPs");
            const [appFont, setAppFont] = useState('Tajawal');
            const [isMobilePreview, setIsMobilePreview] = useState(false);

            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 768) {
                        setIsMobilePreview(false);
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const [headerInfo, setHeaderInfo] = useState({
                ministry: "الجمهورية اليمنية\nوزارة التربية والتعليم\nمكتب التربية والتعليم م/ شبوة",
                school: "مدرسة النقوب للتعليم الأساسي والثانوي",
                studentNameLabel: "اسم الطالب : __________________________",
                classLabel: "الصف : السادس",
                subjectLabel: "المادة : العلوم",
                timeLabel: "الزمن : ساعتان",
                examTitle: "امتحان نهاية الفصل الدراسي الأول للعام الدراسي 2026 / 2027 م",
                teacherName: "مدرسة المادة / سالم أحمد أبو علي"
            });

            const [pageSettings, setPageSettings] = useState({
                isFollowUpPage: false, 
                hasMorePages: false,
                watermarkEnabled: true,
                watermarkText: "مسعود مبارك مسعود",
                watermarkOpacity: 30
            });

            const [questions, setQuestions] = useState([
                {
                id: 1, mark: 0, title: "أولاً: التعليمات:", text: "اقرأ الأسئلة بتمعن ثم أجب:", type: "comprehension", 
                subText: "عزيزي الطالب، هذا الاختبار مصمم لقياس مدى فهمك للمفاهيم الأساسية. أجب عن الأسئلة بخط واضح ومقروء.",
                settings: { layout: 'vertical', bracketsAlign: 'far', showTitle: true, itemSpacing: 'normal', dividerPadding: 'normal' }, items: []
                },
                {
                id: 2, mark: 10, text: "ضع علامة (√) أمام العبارة الصحيحة وعلامة (×) أمام العبارة الخاطئة:", type: "trueFalse",
                settings: { layout: 'vertical', bracketsAlign: 'far', showTitle: true, itemSpacing: 'loose', dividerPadding: 'normal' },
                items: [ { type: 'item', value: 'الاختبارات الذكية توفر الوقت والجهد للمُعلم.' } ]
                }
            ]);

            const totalMarks = questions.reduce((sum, q) => sum + (q.type !== 'PAGE_BREAK' && q.type !== 'comprehension' ? (Number(q.mark) || 0) : 0), 0);

            const pages = [];
            let currentPage = [];
            let currentDisplayNum = 1;

            questions.forEach(q => {
                if (q.type === 'PAGE_BREAK') {
                    if (currentPage.length > 0) { pages.push(currentPage); currentPage = []; }
                } else {
                    const isComprehension = q.type === 'comprehension';
                    currentPage.push({ ...q, displayNum: isComprehension ? '-' : currentDisplayNum++ });
                }
            });
            if (currentPage.length > 0 || pages.length === 0) { pages.push(currentPage); }

            const generateExamFromText = async () => {
                if (!aiRawText.trim()) return;
                setIsGenerating(true);
                setAiStatus(null);

                const systemPrompt = `
                أنت خبير في إعداد الامتحانات لوزارة التربية والتعليم اليمنية. 
                مهمتك هي تحليل النص العشوائي لاستخراج الأسئلة، وتحويلها إلى مصفوفة JSON صالحة لتطبيق React.
                الأنواع المتاحة للأسئلة:
                - "comprehension": للقطع المقالية التي لا تتطلب إجابة مباشرة. ضع النص في "subText".
                - "trueFalse": لأسئلة صح وخطأ.
                - "underline": لأسئلة الاختيارات (ضع خط/اختر).
                - "match": لأسئلة التوصيل.
                - "text": لأسئلة أكمل الفراغ أو الأسئلة المقالية العادية.
                
                أرجع فقط مصفوفة JSON صالحة تماماً بدون أي نص إضافي أو شروحات:
                [
                    {
                    "mark": 5, 
                    "text": "نص الإرشاد",
                    "subText": "", 
                    "type": "trueFalse", 
                    "settings": { "layout": "vertical", "bracketsAlign": "far", "showTitle": true, "itemSpacing": "normal", "dividerPadding": "normal" },
                    "items": [ { "type": "item", "value": "الفقرة الأولى" } ]
                    }
                ]
                `;

                const fullPrompt = systemPrompt + "\n\nالنص للاختبار:\n" + aiRawText;

                try {
                    let generatedText = "";
                    if (!geminiApiKey) {
                        alert("يرجى إدخال مفتاح API الخاص بجيميني في تبويب الإعدادات أولاً.");
                        throw new Error("Missing API Key");
                    }
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    generatedText = data.candidates[0].content.parts[0].text;
                    
                    generatedText = generatedText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const match = generatedText.match(/\[\s*\{.*\}\s*\]/s);
                    if (match) { generatedText = match[0]; }

                    const newQuestions = JSON.parse(generatedText).map(q => ({ ...q, id: Date.now() + Math.random() }));
                    setQuestions(newQuestions);
                    setAiStatus('success');
                    setActiveTab('questions'); 
                } catch (error) {
                    console.error("AI Generation Error:", error);
                    setAiStatus('error');
                } finally { setIsGenerating(false); }
            };

            const handleLogoUpload = (event) => {
                const file = event.target.files[0];
                if (file) { const reader = new FileReader(); reader.onload = (e) => setLogo(e.target.result); reader.readAsDataURL(file); }
            };

            const saveHistory = (id, currentText) => { setTextHistory(prev => ({ ...prev, [id]: [...(prev[id] || []).slice(-10), currentText] })); };
            const handleUndo = (id) => {
                const history = textHistory[id];
                if (history && history.length > 0) {
                    const previousText = history[history.length - 1];
                    const newHistory = history.slice(0, -1);
                    setTextHistory(prev => ({ ...prev, [id]: newHistory }));
                    updateQuestion(id, 'subText', previousText, false); 
                }
            };

            const addQuestion = (type = 'text') => {
                if (type === 'PAGE_BREAK') { setQuestions([...questions, { id: Date.now(), type: 'PAGE_BREAK' }]); return; }
                setQuestions([...questions, {
                    id: Date.now(), mark: type === 'comprehension' ? 0 : 5, title: type === 'comprehension' ? "قطعة القراءة:" : "", text: type === 'comprehension' ? "اقرأ بتمعن:" : "نص السؤال الجديد...", subText: type === 'comprehension' ? "اكتب النص هنا..." : "", type: type,
                    settings: { layout: 'vertical', bracketsAlign: 'far', lineHeight: 'normal', showTitle: true, matchSpacing: 'wide', matchStyle: 'plain', itemSpacing: 'normal', dividerPadding: 'normal' },
                    items: type !== 'comprehension' && type !== 'text' ? [{ type: 'item', value: "فقرة 1" }] : []
                }]);
                
                // Scroll to bottom on mobile
                setTimeout(() => {
                    const container = document.getElementById('controls-container');
                    if(container) container.scrollTop = container.scrollHeight;
                }, 100);
            };

            const removeQuestion = (id) => setQuestions(questions.filter(q => q.id !== id));
            const moveQuestion = (index, direction) => {
                if (index + direction < 0 || index + direction >= questions.length) return;
                const newQs = [...questions];
                [newQs[index], newQs[index + direction]] = [newQs[index + direction], newQs[index]];
                setQuestions(newQs);
            };

            const updateQuestion = (id, field, value, shouldSaveHistory = true) => {
                if (shouldSaveHistory && field === 'subText') { saveHistory(id, questions.find(q => q.id === id).subText); }
                setQuestions(questions.map(q => q.id === id ? { ...q, [field]: value } : q));
            };

            const updateQuestionSettings = (id, settingField, value) => {
                setQuestions(questions.map(q => q.id === id ? { ...q, settings: { ...q.settings, [settingField]: value } } : q));
            };

            const updateItem = (qId, idx, value, field = null) => {
                const q = questions.find(q => q.id === qId); const newItems = [...q.items];
                if (typeof newItems[idx] === 'string') newItems[idx] = value;
                else if (newItems[idx].type) newItems[idx] = { ...newItems[idx], value: value };
                else newItems[idx] = { ...newItems[idx], [field || 'question']: value };
                updateQuestion(qId, 'items', newItems);
            };
            
            const addItemToQuestion = (qId, itemType = 'item') => {
                const q = questions.find(q => q.id === qId);
                let newItem = { type: itemType, value: itemType === 'title' ? "عنوان فرعي:" : "فقرة جديدة" };
                if (q.type === 'match') newItem = { right: "يمين", left: "يسار" };
                else if (q.type === 'underline') newItem = { question: "سؤال جديد...", options: "( خيارات )" };
                let currentItems = q.items || [];
                if (q.type === 'trueFalse' && currentItems.length > 0 && typeof currentItems[0] === 'string') { currentItems = currentItems.map(s => ({ type: 'item', value: s })); }
                updateQuestion(qId, 'items', [...currentItems, newItem]);
            };

            const removeItemFromQuestion = (qId, idx) => { updateQuestion(qId, 'items', questions.find(q => q.id === qId).items.filter((_, i) => i !== idx)); };

            const handleTextTool = (id, action) => {
                const q = questions.find(q => q.id === id); const textArea = document.getElementById(`textarea-${id}`);
                let currentText = q.subText || ""; const start = textArea ? textArea.selectionStart : currentText.length; const end = textArea ? textArea.selectionEnd : currentText.length;
                let insertion = "";
                if (action === 'kashida-1') insertion = "ـ"; else if (action === 'kashida-5') insertion = "ـــــ"; else if (action === 'kashida-10') insertion = "ــــــــــ"; else if (action === 'insert-space') insertion = " __________________ "; else if (action === 'insert-dots') insertion = " ........................ "; else if (action === 'insert-line') insertion = "\n____________________________________________________________________________________________________";
                if (insertion) {
                    const newText = currentText.substring(0, start) + insertion + currentText.substring(end);
                    updateQuestion(id, 'subText', newText);
                    setTimeout(() => { if(textArea) { textArea.focus(); const newPos = start + insertion.length; textArea.setSelectionRange(newPos, newPos); } }, 0);
                }
            };

            const handlePrint = () => {
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('printPdf');
                } else {
                    window.print();
                }
            };

            const getVerticalGap = (spacing) => { if (spacing === 'tight') return 'gap-y-1'; if (spacing === 'loose') return 'gap-y-6'; return 'gap-y-3'; };
            const getDividerPadding = (padding) => { if (padding === 'tight') return 'py-1 min-h-[40px]'; if (padding === 'loose') return 'py-8 min-h-[80px]'; return 'py-3 min-h-[50px]'; };

            const RenderPage = ({ pageQuestions, pageIndex, totalPages, font }) => {
                const isFirstPage = pageIndex === 0; const isLastPage = pageIndex === totalPages - 1; const isFollowUpPage = !isFirstPage;
                const fontClass = font === 'Amiri' ? 'font-amiri' : 'font-tajawal';

                return (
                <div className={`bg-white text-black leading-tight box-border relative flex flex-col text-right shadow-2xl mb-8 print:shadow-none print:mb-0 print:break-after-page overflow-hidden ${fontClass}`} style={{ width: '210mm', height: '297mm', padding: '8mm', margin: '0 auto' }}>
                    <div className="border-[3px] border-black flex-1 flex flex-col relative" style={{ minHeight: '280mm' }}>
                    {pageSettings.watermarkEnabled && pageSettings.watermarkText && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-0 overflow-hidden watermark-container">
                        <div className={`transform -rotate-45 text-gray-300 font-black whitespace-nowrap select-none ${fontClass}`} style={{ fontSize: '4rem', opacity: (pageSettings.watermarkOpacity !== undefined ? pageSettings.watermarkOpacity : 30) / 100 }}>{pageSettings.watermarkText}</div>
                        </div>
                    )}
                    {!isFollowUpPage && (
                        <div className="flex border-b-[2px] border-black h-[28mm] relative z-10 bg-white/80">
                            <div className="w-[30%] border-l-[2px] border-black p-1 text-center text-[11px] font-bold pt-3 leading-snug"><div style={{ whiteSpace: 'pre-line' }}>{headerInfo.ministry}</div><div className="mt-1">{headerInfo.school}</div></div>
                            <div className="w-[35%] flex justify-center items-center overflow-hidden p-1">{logo ? <img src={logo} alt="Logo" className="max-h-full max-w-full object-contain" /> : <div className="font-bold text-[12px] opacity-50">بسم الله الرحمن الرحيم</div>}</div>
                            <div className="w-[35%] border-r-[2px] border-black p-2 text-right text-[12px] font-bold leading-6 flex flex-col justify-between"><div>{headerInfo.studentNameLabel}</div><div className="flex gap-4"><span>{headerInfo.classLabel}</span><span className="mr-auto"></span></div><div>{headerInfo.subjectLabel}</div><div>{headerInfo.timeLabel}</div></div>
                        </div>
                    )}
                    <div className="border-b-[2px] border-black bg-gray-50/90 text-center py-1 font-bold text-[13px] relative z-10">{isFollowUpPage ? `تـــابـــع الأســئــلــة - ${headerInfo.subjectLabel}` : headerInfo.examTitle}</div>
                    {!isFollowUpPage && (
                        <div className="border-b-[2px] border-black flex h-[18mm] relative z-10 bg-white/80">
                        <div className="flex-1 flex flex-col">
                            <div className="flex border-b border-black h-1/3">
                            <div className="flex-[2] border-l border-black flex items-center justify-center font-bold text-[10px]">السؤال</div>
                            {[0,1,2,3,4,5,6,7].map(i => (<div key={i} className="flex-1 border-l border-black flex items-center justify-center font-bold text-[10px]">{i < questions.filter(q=>q.type!=='PAGE_BREAK' && q.type!=='comprehension').length ? `س${i+1}` : ''}</div>))}
                            <div className="flex-[3] flex items-center justify-center font-bold text-[10px]">المجموع</div>
                            </div>
                            <div className="flex border-b border-black h-1/3">
                            <div className="flex-[2] border-l border-black flex items-center justify-center font-bold text-[9px] bg-gray-50">الدرجة</div>
                            {[0,1,2,3,4,5,6,7].map(i => { const realQs = questions.filter(q=>q.type!=='PAGE_BREAK' && q.type!=='comprehension'); return (<div key={i} className="flex-1 border-l border-black flex items-center justify-center font-bold text-[11px]">{i < realQs.length ? realQs[i].mark : ''}</div>) })}
                            <div className="flex-[3] flex h-full"><div className="w-1/2 border-l border-black flex items-center justify-center font-bold text-[12px] bg-gray-50">{totalMarks > 0 ? totalMarks : ''}</div><div className="w-1/2 flex items-center justify-center text-[8px] text-gray-400">الدرجة المحولة</div></div>
                            </div>
                            <div className="flex h-1/3">
                            <div className="flex-[2] border-l border-black flex items-center justify-center font-bold text-[9px] bg-gray-50">الدرجة الحاصل عليها</div>
                            {[0,1,2,3,4,5,6,7].map(i => <div key={i} className="flex-1 border-l border-black"></div>)}
                            <div className="flex-[3] flex h-full"><div className="w-1/2 border-l border-black"></div><div className="w-1/2 border-t border-black relative"><div className="absolute inset-0 flex flex-col"><div className="h-1/2 border-b border-black/50"></div><div className="h-1/2"></div></div></div></div>
                            </div>
                        </div>
                        <div className="w-8 border-r-[2px] border-black flex items-center justify-center bg-gray-50"><span className="transform rotate-90 whitespace-nowrap font-bold text-[11px]">الدرجــــــات</span></div>
                        </div>
                    )}
                    {!isFollowUpPage && (<div className="text-center font-bold border-b-[2px] border-black py-0.5 bg-gray-100/90 text-[12px] relative z-10">أجــب مـسـتـعـيـنـاً بـالـلـه عـن جـمـيـع الأسـئـلـة الـتـالـيـة</div>)}
                    <div className="flex-1 relative flex flex-col z-10">
                        <div className="absolute inset-0 flex pointer-events-none"><div className="w-10 border-l-[2px] border-black h-full bg-white"></div><div className="flex-1"></div><div className="w-10 border-r-[2px] border-black h-full bg-white/50"></div></div>
                        <div className="z-10 flex flex-col">
                        {pageQuestions.map((q, i) => (
                            <div key={q.id} className={`flex w-full border-b border-black ${getDividerPadding(q.settings?.dividerPadding)}`}>
                                <div className="w-10 flex items-start justify-center shrink-0 pt-1"><div className="font-bold text-[14px]">{q.displayNum !== '-' ? `س${q.displayNum}` : ''}</div></div>
                                <div className="flex-1 px-4 border-black relative bg-white">
                                    {q.title && (<div className="font-black text-[13px] mb-1 underline decoration-gray-400 decoration-1 underline-offset-4">{q.title}</div>)}
                                    {q.settings?.showTitle !== false && (<div className="font-bold text-[14px] mb-2">{q.text}</div>)}
                                    {q.type === 'comprehension' && (<div className={`bg-gray-100/80 border border-gray-300 p-4 rounded-lg shadow-inner whitespace-pre-wrap text-[13px] font-medium ${fontClass} ${q.settings?.lineHeight === 'tight' ? 'leading-normal' : q.settings?.lineHeight === 'loose' ? 'leading-[2.5]' : 'leading-loose'}`} style={{overflowWrap: 'anywhere', textAlign: 'justify'}}>{q.subText}</div>)}
                                    {q.type === 'text' && (<div className={`whitespace-pre-wrap text-[13px] font-medium ${fontClass} ${q.settings?.lineHeight === 'tight' ? 'leading-normal' : q.settings?.lineHeight === 'loose' ? 'leading-[2.5]' : 'leading-loose'}`} style={{overflowWrap: 'anywhere', textAlign: 'justify'}}>{q.subText}</div>)}
                                    {q.type === 'match' && (
                                    <div className={`flex mt-4 mb-4 ${q.settings?.matchSpacing === 'close' ? 'justify-center gap-16' : q.settings?.matchSpacing === 'normal' ? 'justify-around' : 'justify-between px-12'}`}>
                                        <div className={`flex flex-col ${getVerticalGap(q.settings?.itemSpacing)} text-center font-bold text-[13px]`}>{q.items?.map((item, ix) => item.right && <div key={ix} className={`${q.settings?.matchStyle === 'boxed' ? 'border border-black px-4 py-1 rounded' : ''}`}>• {item.right}</div>)}</div>
                                        <div className={`flex flex-col ${getVerticalGap(q.settings?.itemSpacing)} text-center font-bold text-[13px]`}>{q.items?.map((item, ix) => item.left && <div key={ix} className={`${q.settings?.matchStyle === 'boxed' ? 'border border-black px-4 py-1 rounded' : ''}`}>• {item.left}</div>)}</div>
                                    </div>
                                    )}
                                    {q.type === 'trueFalse' && (
                                    <div className={`mt-2 pr-2 ${q.settings?.layout === 'grid' ? `grid grid-cols-2 gap-x-8 ${getVerticalGap(q.settings?.itemSpacing)}` : `flex flex-col ${getVerticalGap(q.settings?.itemSpacing)}`}`}>
                                        {q.items?.map((item, idx) => {
                                            const isObject = typeof item === 'object'; const type = isObject ? item.type : 'item'; const val = isObject ? item.value : item;
                                            if (type === 'title') { return <div key={idx} className={`font-bold text-[13px] underline decoration-gray-400 mt-2 mb-1 ${q.settings?.layout === 'grid' ? 'col-span-2' : ''}`}>{val}</div>; }
                                            return (<div key={idx} className={`flex pl-2 ${q.settings?.bracketsAlign === 'near' ? 'justify-start gap-2 items-baseline' : 'justify-between items-end'}`}><div className={`text-[13px] leading-relaxed font-medium ${q.settings?.bracketsAlign === 'near' ? '' : 'relative -top-1'}`}><span className="font-bold ml-2">•</span>{val}</div><div className="font-bold text-[13px] whitespace-nowrap">( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; )</div></div>)
                                        })}
                                    </div>
                                    )}
                                    {q.type === 'underline' && (

                                            return (
                                            <div key={i} className="flex gap-2 items-center">
                                                {type === 'title' ? (<div className="flex-1 flex gap-2 items-center bg-gray-100 p-1.5 rounded-md border border-gray-200 shadow-inner"><i className="fas fa-font text-gray-400 text-xs ml-1"></i><input className="flex-1 bg-transparent font-bold text-gray-700 outline-none text-xs" value={val} onChange={(e) => updateItem(q.id, i, e.target.value)} placeholder="عنوان فرعي..." /></div>) : (<><span className="text-xs text-gray-400 w-4">{i+1}</span>{q.type === 'trueFalse' ? (<input className="flex-1 p-2 text-xs border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" value={val} onChange={(e) => updateItem(q.id, i, e.target.value)} placeholder="الفقرة" />) : (<><input className="flex-1 p-2 text-xs border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="السؤال" value={val} onChange={(e) => updateItem(q.id, i, e.target.value, 'question')} /><input className="w-1/3 p-2 text-xs border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="(الخيارات)" value={item.options} onChange={(e) => updateItem(q.id, i, e.target.value, 'options')} /></>)}</>)}
                                                <button onClick={() => removeItemFromQuestion(q.id, i)} className="text-red-500 bg-red-50 p-2 rounded-md hover:bg-red-100 transition-colors"><i className="fas fa-trash text-xs"></i></button>
                                            </div>
                                            )
                                        })}
                                        <div className="flex gap-2 mt-2"><button onClick={() => addItemToQuestion(q.id, 'item')} className="flex-1 text-indigo-600 font-bold text-xs bg-indigo-50 hover:bg-indigo-100 py-2 rounded-md transition-colors border border-indigo-200">+ إضافة فقرة</button>{q.type === 'trueFalse' && (<button onClick={() => addItemToQuestion(q.id, 'title')} className="flex-1 text-gray-600 font-bold text-xs bg-gray-100 hover:bg-gray-200 py-2 rounded-md flex items-center justify-center gap-2 transition-colors border border-gray-300"><i className="fas fa-font text-[10px]"></i> + عنوان فرعي</button>)}</div>
                                    </div>
                                    </div>
                                )}
                                <div className="mt-3 border-t pt-3 flex gap-3">
                                    <div className="flex-1 flex flex-col gap-2"><span className="text-[10px] text-gray-500 font-bold flex items-center gap-1"><i className="fas fa-arrows-alt-v text-[10px]"></i> تباعد الفقرات:</span><div className="flex gap-1"><button onClick={() => updateQuestionSettings(q.id, 'itemSpacing', 'tight')} className={`flex-1 py-1 text-[10px] rounded transition-colors ${q.settings?.itemSpacing === 'tight' ? 'bg-slate-700 text-white' : 'bg-gray-100 hover:bg-gray-200'}`}>ضيق</button><button onClick={() => updateQuestionSettings(q.id, 'itemSpacing', 'normal')} className={`flex-1 py-1 text-[10px] rounded transition-colors ${!q.settings?.itemSpacing || q.settings?.itemSpacing === 'normal' ? 'bg-slate-700 text-white' : 'bg-gray-100 hover:bg-gray-200'}`}>عادي</button><button onClick={() => updateQuestionSettings(q.id, 'itemSpacing', 'loose')} className={`flex-1 py-1 text-[10px] rounded transition-colors ${q.settings?.itemSpacing === 'loose' ? 'bg-slate-700 text-white' : 'bg-gray-100 hover:bg-gray-200'}`}>واسع</button></div></div>
                                    <div className="flex-1 flex flex-col gap-2"><span className="text-[10px] text-gray-500 font-bold flex items-center gap-1"><i className="fas fa-arrows-alt-v text-[10px]"></i> السطر الفاصل:</span><div className="flex gap-1"><button onClick={() => updateQuestionSettings(q.id, 'dividerPadding', 'tight')} className={`flex-1 py-1 text-[10px] rounded transition-colors ${q.settings?.dividerPadding === 'tight' ? 'bg-slate-700 text-white' : 'bg-gray-100 hover:bg-gray-200'}`}>متقارب</button><button onClick={() => updateQuestionSettings(q.id, 'dividerPadding', 'normal')} className={`flex-1 py-1 text-[10px] rounded transition-colors ${!q.settings?.dividerPadding || q.settings?.dividerPadding === 'normal' ? 'bg-slate-700 text-white' : 'bg-gray-100 hover:bg-gray-200'}`}>عادي</button><button onClick={() => updateQuestionSettings(q.id, 'dividerPadding', 'loose')} className={`flex-1 py-1 text-[10px] rounded transition-colors ${q.settings?.dividerPadding === 'loose' ? 'bg-slate-700 text-white' : 'bg-gray-100 hover:bg-gray-200'}`}>متباعد</button></div></div>
                                </div>
                            </div>
                            )
                        })}
                        <div className="grid grid-cols-2 gap-3 mt-4">
                            <button onClick={() => addQuestion('text')} className="col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-bold shadow flex justify-center items-center gap-2 transition-all active:scale-95"><i className="fas fa-plus"></i> إضافة سؤال</button>
                            <button onClick={() => addQuestion('comprehension')} className="bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 py-3 rounded-xl text-sm font-bold shadow-sm flex justify-center items-center gap-2 transition-all active:scale-95"><i className="fas fa-file-alt"></i> قطعة قراءة</button>
                            <button onClick={() => addQuestion('PAGE_BREAK')} className="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 py-3 rounded-xl text-sm font-bold shadow-sm flex justify-center items-center gap-2 transition-all active:scale-95"><i className="fas fa-cut -rotate-90"></i> فاصل أوراق</button>
                        </div>
                        </div>
                    )}
                    {activeTab === 'ai' && (
                        <div className="flex flex-col h-full p-2 animate-fade-in pb-16">
                            <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-6 mb-4 text-center shadow-sm">
                            <i className="fas fa-bolt text-indigo-600 text-4xl mx-auto mb-3 block"></i>
                            <h3 className="font-bold text-lg text-indigo-900 mb-2">المولد الذكي (Gemini API)</h3>
                            <p className="text-xs text-indigo-700 leading-relaxed">يتم التوليد الآن مباشرة عبر مفتاح API الخاص بك وبأقصى سرعة ممكنة.</p>
                            </div>
                            <textarea className="w-full flex-1 min-h-[200px] p-4 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none shadow-inner transition-shadow" placeholder="الصق نص الاختبار العشوائي هنا..." value={aiRawText} onChange={(e) => setAiRawText(e.target.value)} disabled={isGenerating}></textarea>
                            {aiStatus === 'error' && (<div className="mt-4 flex items-center gap-2 text-red-600 bg-red-50 p-3 rounded-lg border border-red-200 text-sm font-bold animate-fade-in"><i className="fas fa-exclamation-triangle"></i> حدث خطأ. تأكد من اتصالك ومن صلاحية مفتاح الـ API.</div>)}
                            {aiStatus === 'success' && (<div className="mt-4 flex items-center gap-2 text-green-600 bg-green-50 p-3 rounded-lg border border-green-200 text-sm font-bold animate-fade-in"><i className="fas fa-check-circle"></i> تم إنشاء الاختبار بنجاح!</div>)}
                            <button onClick={generateExamFromText} disabled={isGenerating || !aiRawText.trim()} className="mt-5 w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-4 rounded-xl text-base font-bold shadow-lg flex justify-center items-center gap-2 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                            {isGenerating ? <><i className="fas fa-spinner fa-spin"></i> جاري التوليد والتحليل...</> : <><i className="fas fa-wand-magic-sparkles"></i> توليد ورقة الاختبار سحرياً</>}
                            </button>
                        </div>
                    )}
                    </div>
                    
                    <div className="p-4 bg-white border-t shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-30">
                        <button onClick={handlePrint} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl text-base font-bold shadow flex justify-center items-center gap-2 transition-transform active:scale-95"><i className="fas fa-print"></i> تصدير أو طباعة ({pages.length} ورقة)</button>
                    </div>
                </div>

                <div className={`${!isMobilePreview ? 'hidden md:flex' : 'flex'} flex-1 h-full bg-gray-800 relative flex-col items-center overflow-hidden shadow-inner`}>
                    <div className="absolute top-4 left-4 z-50 flex gap-1 bg-slate-900/80 backdrop-blur border border-slate-700 rounded-lg shadow-2xl p-1 print:hidden">
                    <button onClick={() => setZoom(z => Math.max(0.3, z - 0.05))} className="p-3 hover:bg-slate-800 rounded-md text-white transition-colors active:bg-slate-700"><i className="fas fa-search-minus"></i></button>
                    <span className="p-3 min-w-[3.5rem] text-center font-mono text-xs flex items-center justify-center text-white font-bold">{Math.round(zoom * 100)}%</span>
                    <button onClick={() => setZoom(z => Math.min(1.5, z + 0.05))} className="p-3 hover:bg-slate-800 rounded-md text-white transition-colors active:bg-slate-700"><i className="fas fa-search-plus"></i></button>
                    </div>
                    <div className="flex-1 w-full overflow-y-auto overflow-x-hidden flex flex-col items-center p-8 custom-scrollbar scroll-smooth touch-pan-y touch-pan-x">
                    <div className="flex flex-col gap-8 transition-transform duration-300 origin-top" style={{ transform: `scale(${zoom})`, marginBottom: `${(zoom - 1) * 297}mm` }}>
                        {pages.map((pageQs, index) => (<RenderPage key={index} pageQuestions={pageQs} pageIndex={index} totalPages={pages.length} font={appFont} />))}
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
